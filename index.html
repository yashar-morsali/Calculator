<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main>
      <div class="calculator">
        <div class="display">
          <div class="firstNum">Inter the Numbers:</div>
          <div class="mainNum"></div>
        </div>
        <button class="Btn ACBtn">Ac</button>
        <button class="Btn eraseBtn"><-</button>
        <button class="Btn devideBtn">/</button>
        <button class="Btn multiplyBtn">x</button>
        <button data-input="7" class="Btn Btn7">7</button>
        <button data-input="8" class="Btn Btn8">8</button>
        <button data-input="9" class="Btn Btn9">9</button>
        <button class="Btn BtnMinus">-</button>
        <button data-input="4" class="Btn Btn4">4</button>
        <button data-input="5" class="Btn Btn5">5</button>
        <button data-input="6" class="Btn Btn6">6</button>
        <button class="Btn plusBtn">+</button>
        <button data-input="1" class="Btn Btn1">1</button>
        <button data-input="2" class="Btn Btn2">2</button>
        <button data-input="3" class="Btn Btn3">3</button>
        <button data-input="0" class="Btn Btn0">0</button>
        <button class="Btn BtnPoint">.</button>
        <button class="Btn BtnEqual">=</button>
      </>
    </main>
    <script>

      class Calculator {
        constructor(){
          this._lastNumber=0
        }
        _errorCheck(input){
          if(typeof(input) !== "number"){
            throw new TypeError("please inter a valid number! ")}
        }

        plus(num){
          this._errorCheck(num)
          this._lastNumber = this._lastNumber + num
          return this._lastNumber

        }
        minus(num){
          this._errorCheck(num)
          this._lastNumber = this.plus(-1*num)
          return this._lastNumber
        }
        muliply(num){
          this._errorCheck(num)
          if(num === 0){
            this._lastNumber = 0
            return 0
          }
          else{
            this._lastNumber = this._lastNumber * num
            return this._lastNumber
          }
        }
        divide(num){
          this._errorCheck(num)
          if(num === 0){
            return this._lastNumber
          }
          else{
            this._lastNumber= this._lastNumber / num
            return this._lastNumber
          }
        }
        clear(){
          this._lastNumber = 0
        }
      }

    </script>
  </body>
</html>
